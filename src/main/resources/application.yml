spring:
  application:
    name: mail-manager
  threads:
    virtual:
      enabled: true # Project Loom (Regla JAVA_02)
  
  # Logging Estructurado nativo de Spring Boot 3.4+
  logging:
    structured:
      format:
        console: json

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - https://www.googleapis.com/auth/gmail.send # Regla SEC_02
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
      resourceserver:
        jwt:
          issuer-uri: https://accounts.google.com

  main:
    banner-mode: "off"

server:
  port: 8080
  http2:
    enabled: true # Mayor rendimiento

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.app.mailmanager: DEBUG
    org.springframework.security: INFO

